spring:
  application:
    name: three
  sql:
    init:
      mode: never

  datasource:
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:pinguim01}
    url: ${DB_URL}
    jdbc-url: ${DB_URL}
    jdbcUrl: ${DB_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      jdbc-url: ${DB_URL}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show-sql: true
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: true
  mongodb:
    uri: ${MONGO_URL}

  logging:
    level.org.springframework.batch: DEBUG
    level.org.example.batchmongo: DEBUG

  data:
    redis:
      host: localhost
      port: 6379

app:
  mongoCollection: ${COLLECTION_THREE}
  maxValueDifference: ${MAX_VALUE:100}
  comparisonCollection: ${COLLECTION_COMPARISON}

